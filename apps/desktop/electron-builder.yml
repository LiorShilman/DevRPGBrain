appId: com.devrpg.brain
productName: DevRPG Brain
copyright: Copyright © 2025

directories:
  buildResources: build-resources
  output: release

files:
  - out/**/*
  - package.json
  - "!out/**/*.map"

extraResources:
  - from: ../../apps/api/dist
    to: api
  - from: ../../apps/api/node_modules
    to: api/node_modules
  - from: ../../prisma
    to: prisma

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: DevRPG-Brain-Setup-${version}.exe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: DevRPG Brain

mac:
  target: dmg
  category: public.app-category.developer-tools

linux:
  target: AppImage

publish: null
